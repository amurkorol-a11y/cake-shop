<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Bakary | Нежные десерты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    .btn-primary { width: 100%; padding: 0.75rem 1rem; background: linear-gradient(to right, #ec4899, #f43f5e); color: white; font-weight: 600; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-primary:hover { background: linear-gradient(to right, #db2777, #e11d48); }
    .btn-primary:active { transform: scale(0.95); }
    .btn-secondary { width: 100%; padding: 0.75rem 1rem; background-color: white; color: #374151; font-weight: 600; border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); border: 1px solid #e5e7eb; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-secondary:hover { background-color: #f9fafb; }
    .btn-secondary:active { transform: scale(0.95); }
    .btn-flowwow { width: 100%; padding: 0.75rem 1rem; background-color: #f97316; color: white; font-weight: 600; border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-flowwow:hover { background-color: #ea580c; }
    .btn-flowwow:active { transform: scale(0.95); }
    .product-card { background-color: white; border-radius: 1rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); overflow: hidden; border: 1px solid #f3f4f6; display: flex; flex-direction: column; }
    .product-image-container { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background-color: #f3f4f6; }
    .product-image { width: 100%; height: 100%; object-fit: cover; }
    .toast-enter-active, .toast-leave-active { transition: all 0.3s ease; }
    .toast-enter-from { transform: translateY(-100%); opacity: 0; }
    .toast-leave-to { transform: translateY(-100%); opacity: 0; }
    .zone-badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .zone-1 { background-color: #e6f7e6; color: #2e7d32; }
    .zone-2 { background-color: #fff3e0; color: #e65100; }
    .zone-3 { background-color: #ffebee; color: #b71c1c; }
  </style>
</head>
<body class="antialiased text-gray-800 h-screen overflow-hidden flex flex-col">
  <div id="app" class="h-full flex flex-col max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden">

    <!-- здесь минимальный шаблон с кнопкой перехода в корзину -->
    <header class="bg-white px-4 py-3 border-b border-gray-100 flex items-center justify-between">
      <h1 class="text-xl font-bold text-pink-600">🍰 Bakary</h1>
      <button @click="goToCart" class="btn-secondary w-auto px-3 py-1">
        🛒 Корзина
        <span v-if="cartCount > 0" class="ml-2 bg-pink-100 text-pink-600 px-2 py-0.5 rounded-full text-xs">
          {{ cartCount }} шт.
        </span>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto bg-gray-50">
      <div v-if="currentView === 'home'" class="p-4">
        <p class="mb-4">Главная. Тестовый экран.</p>
        <button @click="currentView = 'catalog'" class="btn-primary">Перейти в каталог</button>
      </div>

      <div v-else-if="currentView === 'cart'" class="p-4">
        <h2 class="text-lg font-bold mb-2">Корзина</h2>
        <p v-if="cartCount === 0">Корзина пуста</p>
        <div v-else>
          <div v-for="item in cartItems" :key="item.id">{{ item.name }} — {{ item.quantity }}</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const currentView = ref('home');
        const cart = ref([]);
        const products = ref([]);

        const cartItems = computed(() => cart.value);
        const cartCount = computed(() => cart.value.reduce((s, i) => s + i.quantity, 0));

        const goToCart = () => {
          currentView.value = 'cart';
        };

        return { currentView, cart, cartItems, cartCount, goToCart };
      }
    }).mount('#app');
  </script>
</body>
</html>
